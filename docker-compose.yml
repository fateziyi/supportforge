# SupportForge 全栈本地部署配置
# 使用方式：docker compose up -d

services:
  # ── 后端 API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supportforge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - supportforge

  # ── 前端 Web ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: supportforge-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - supportforge

  # ── PostgreSQL 数据库 ──
  postgres:
    image: postgres:16-alpine
    container_name: supportforge-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: supportforge
      POSTGRES_USER: supportforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supportforge_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supportforge

  # ── Redis 缓存 ──
  redis:
    image: redis:7-alpine
    container_name: supportforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - supportforge

  # ── Qdrant 向量数据库 ──
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: supportforge-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - supportforge

  # ── Celery Worker（异步任务）──
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: supportforge-celery-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - postgres
    networks:
      - supportforge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  backend-uploads:

networks:
  supportforge:
    driver: bridge