name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'

jobs:
  lint-and-test:
    name: Lint + Type Check + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'

      - name: Install Poetry
        run: pip install poetry==2.4.0

      - name: Install dependencies
        run: poetry install --with dev

      - name: Ruff Lint
        run: poetry run ruff check app/ scripts/

      - name: Black Format Check
        run: poetry run black --check app/ scripts/

      - name: MyPy Type Check
        run: poetry run mypy app/ --ignore-missing-imports
        continue-on-error: true  # 初期允许类型检查不完全通过

      - name: Run Tests
        run: |
          if [ -d tests ]; then
            poetry run pytest tests/ -v --tb=short
          else
            echo "tests/ directory not found, skip pytest for now"
          fi
        env:
          PYTHONPATH: app