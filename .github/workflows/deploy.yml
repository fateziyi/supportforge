name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 后端镜像构建与推送 ──
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/supportforge-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/supportforge-backend:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/supportforge-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/supportforge-frontend:${{ github.sha }}

      # ── 部署到远程服务器 ──
      # 需要在 GitHub Secrets 中配置:
      #   DEPLOY_HOST - 服务器 IP
      #   DEPLOY_USER - SSH 用户名
      #   DEPLOY_KEY  - SSH 私钥
      #   DEPLOY_PATH - 项目部署路径
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DPLOY_HOST }}
          username: ${{ secrets.DPLOY_USER }}
          key: ${{ secrets.DPLOY_KEY }}
          script: |
            cd ${{ secrets.DPLOY_PATH }}
            docker compose pull
            docker compose up -d
            docker compose ps